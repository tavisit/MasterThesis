name: Export Unity Package

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch:

env:
  UNITY_VERSION: "6000.0.55f1"
  PACKAGE_NAME: "ProceduralCityGenerator"

jobs:
  export-package:
    name: Export .unitypackage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Code/Library
          key: Library-${{ hashFiles('Code/Assets/**', 'Code/Packages/**', 'Code/ProjectSettings/**') }}
          restore-keys: Library-
          
      - name: Update README version
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          SHORT_HASH=$(git rev-parse --short HEAD)
          VERSION="${{ github.ref_name }}"
          sed -i "s/VERSION_PLACEHOLDER/${VERSION} (${RELEASE_DATE} - ${SHORT_HASH})/" Code/Assets/PCG/README.md
          
      - name: Export .unitypackage via GameCI
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: Code
          buildMethod: PackageExporter.Export
          allowDirtyBuild: true
          targetPlatform: StandaloneLinux64

      - name: Fix build output permissions
        if: always()
        run: sudo chown -R $USER:$USER Code/Builds Code/Library || true

      - name: Verify package was created
        run: |
          if [ ! -f "Code/Builds/${{ env.PACKAGE_NAME }}.unitypackage" ]; then
            echo "=== EXPORT FAILED: .unitypackage not found ==="
            find Code/Builds -type f 2>/dev/null || echo "Builds directory is empty or missing"
            exit 1
          fi
          ls -lh Code/Builds/

      - name: Stamp version into filename
        id: version
        run: |
          RELEASE_DATE=$(date +%Y-%m-%d)
          SHORT_HASH=$(git rev-parse --short HEAD)
          VERSION="${RELEASE_DATE}-${SHORT_HASH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          mv Code/Builds/${{ env.PACKAGE_NAME }}.unitypackage \
             Code/Builds/${{ env.PACKAGE_NAME }}-${VERSION}.unitypackage
          echo "package_file=Code/Builds/${{ env.PACKAGE_NAME }}-${VERSION}.unitypackage" >> $GITHUB_OUTPUT

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.version.outputs.version }}
          path: Code/Builds/*.unitypackage
          retention-days: 90
          
      - name: Attach package to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.package_file }}
          body_path: Code/Assets/PCG/README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}