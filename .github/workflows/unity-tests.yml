name: Unity Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  UNITY_VERSION: "6000.0.55f1"

jobs:
  test:
    name: Run Unity Tests (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Code/Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Code/Assets/**', 'Code/Packages/**', 'Code/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: Code
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults/${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} Test Results
          targetPlatform: StandaloneLinux64

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults-${{ matrix.testMode }}
          path: TestResults/${{ matrix.testMode }}
          retention-days: 14